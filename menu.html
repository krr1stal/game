<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Miner</title>
    <style>
        body { margin: 0; background-color: #1a1613; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель */
        .header { display: flex; justify-content: space-between; padding: 15px 20px; font-weight: bold; color: #facc15; font-size: 18px; }
        
        /* Карточка баланса */
        .balance-container { background: rgba(0, 0, 0, 0.4); margin: 10px 20px; padding: 15px; border-radius: 10px; border: 2px solid #3d2b1f; text-align: left; }
        .balance-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .label { color: #facc15; font-size: 16px; }
        .amount { color: #ffffff; font-size: 20px; font-weight: bold; }

        /* Игровая зона */
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .miner-img { width: 180px; image-rendering: pixelated; margin-bottom: 20px; }
        
        /* Кнопка сбора */
        .collect-btn { background: #facc15; color: #1a1613; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #a16207; }
        .collect-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a16207; }

        /* Иконки по бокам (как на скриншоте) */
        .side-menu { position: absolute; display: flex; flex-direction: column; gap: 20px; }
        .left-side { left: 20px; top: 50%; transform: translateY(-50%); }
        .right-side { right: 20px; top: 50%; transform: translateY(-50%); }
        .side-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #facc15; }
        .side-icon { width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #facc15; margin-bottom: 5px; }

        /* Нижнее меню */
        .nav-bar { background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #facc15; }
        .nav-icon { font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <span>Crypto Miner</span>
        <span>user_8492</span>
    </div>

    <div class="balance-container">
        <div class="balance-row">
            <span class="label">Balance</span>
            <span class="amount" id="balance">100 Coins</span>
        </div>
    </div>

    <div class="game-area">
        <div class="side-menu left-side">
            <div class="side-item"><div class="side-icon">🎟️</div>Coupon</div>
            <div class="side-item"><div class="side-icon">👥</div>Referrals</div>
        </div>

        <div class="side-menu right-side">
            <div class="side-item"><div class="side-icon">🧪</div>Booster</div>
            <div class="side-item"><div class="side-icon">🎁</div>Lucky Box</div>
        </div>

        <div style="font-size: 80px; margin-bottom: 20px;">⛏️</div>
        <p style="color: #facc15; font-weight: bold;">Mining in progress...</p>
        
        <button class="collect-btn" onclick="collectCoins()">Collect 10 Coins</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">🏠</span>Home</div>
        <div class="nav-item"><span class="nav-icon">✔️</span>Check-In</div>
        <div class="nav-item"><span class="nav-icon">📢</span>Advertise</div>
        <div class="nav-item"><span class="nav-icon">👛</span>Wallet</div>
        <div class="nav-item"><span class="nav-icon">👤</span>Profile</div>
    </div>

    <script>
        let coins = 100;
        function collectCoins() {
            coins += 10;
            document.getElementById('balance').innerText = coins + " Coins";
        }
    </script>

</body>
</html>

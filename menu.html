<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Miner Menu</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .header { background: #161b22; padding: 20px; border-bottom: 2px solid #facc15; }
        .balance-card { background: #1e293b; margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        .balance-amount { font-size: 32px; color: #facc15; font-weight: bold; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-item { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #334155; cursor: pointer; }
        .menu-item:active { transform: scale(0.95); }
        .icon { font-size: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">CRYPTO MINER</h2>
    </div>

    <div class="balance-card">
        <div style="color: #8b949e; margin-bottom: 5px;">Current Balance</div>
        <div class="balance-amount">0.000054 BTC</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item">
            <div class="icon">⛏️</div>
            <div>Mining</div>
        </div>
        <div class="menu-item">
            <div class="icon">📺</div>
            <div>Ads (PTC)</div>
        </div>
        <div class="menu-item">
            <div class="icon">👥</div>
            <div>Friends</div>
        </div>
        <div class="menu-item">
            <div class="icon">💰</div>
            <div>Wallet</div>
        </div>
    </div>

</body>
</html>

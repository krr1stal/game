<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Miner</title>
    
    <style>
        body { 
            margin: 0; background-color: #1a1613; color: white; 
            font-family: 'Courier New', Courier, monospace; text-align: center; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            -webkit-user-select: none;
        }
        .header { padding: 15px 20px; font-weight: bold; color: #facc15; font-size: 18px; text-align: left; }
        .balance-container { 
            background: rgba(0, 0, 0, 0.4); margin: 10px 20px; padding: 15px; 
            border-radius: 10px; border: 2px solid #3d2b1f; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .label { color: #facc15; font-size: 16px; }
        .amount { color: #ffffff; font-size: 20px; font-weight: bold; }
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .collect-btn { 
            background: #facc15; color: #1a1613; border: none; padding: 15px 40px; 
            border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; 
            box-shadow: 0 4px 0 #a16207; margin-top: 20px; transition: transform 0.1s;
        }
        .collect-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a16207; }
        .collect-btn:disabled { background: #555; box-shadow: none; color: #888; cursor: not-allowed; }
        
        #ad-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .ad-timer { color: #facc15; font-size: 30px; margin-top: 20px; font-weight: bold; }
        .nav-bar { background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; width: 50%; }
        .nav-item.active { color: #facc15; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="ad-overlay">
        <div style="font-size: 50px;">💎</div>
        <h2 id="ad-status" style="color: #facc15; margin: 10px 0;">LOADING REWARD...</h2>
        
        <div id="ad-wrapper" style="margin: 15px 0; min-height: 250px; background: #000; display: flex; align-items: center; justify-content: center;">
            <iframe id="ad-frame" data-aa='YOUR_ID' src='https://ad.a-ads.com/YOUR_ID?size=300x250' 
                    style='width:300px; height:250px; border:0px; padding:0; overflow:hidden; background-color: transparent;'>
            </iframe>
        </div>

        <p id="ad-hint">Mining... wait <span id="ad-timer" style="color:#facc15">10</span>s</p>
    </div>

    <div class="header">Crypto Miner</div>

    <div class="balance-container">
        <span class="label">Balance</span>
        <span class="amount" id="balance">0 Coins</span>
    </div>

    <div class="game-area">
        <div style="font-size: 110px; filter: drop-shadow(0 0 15px rgba(250,204,21,0.2));">⛏️</div>
        <p style="color: #facc15; font-weight: bold; margin-top: 20px;">Mining in progress...</p>
        <button id="collect-btn" class="collect-btn" onclick="showAd()">Collect 25 Coins</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">🏠</span>Home</div>
        <div class="nav-item" onclick="alert('Wallet coming soon!')"><span class="nav-icon">👛</span>Wallet</div>
    </div>

    <script>
        let coins = Number(localStorage.getItem('miner_balance')) || 0;
        let isAdBlocked = true; 
        
        const balanceDisplay = document.getElementById('balance');
        const adOverlay = document.getElementById('ad-overlay');
        const adTimerText = document.getElementById('ad-timer');
        const collectBtn = document.getElementById('collect-btn');
        const adStatus = document.getElementById('ad-status');
        const adFrame = document.getElementById('ad-frame');

        balanceDisplay.innerText = coins + " Coins";

        function showAd() {
            collectBtn.disabled = true;
            adOverlay.style.display = 'flex';
            isAdBlocked = true; 
            
            // Перезагружаем фрейм для новой проверки
            adFrame.src = adFrame.src;
            
            let timeLeft = 10;
            adTimerText.innerText = timeLeft;

            const checkInterval = setInterval(() => {
                const frame = document.getElementById('ad-frame');
                
                // ДВОЙНАЯ ПРОВЕРКА: высота + попытка доступа (Cross-Origin)
                let accessible = true;
                try {
                    // Если AdGuard подменил страницу на свою, мы сможем прочитать её адрес
                    let test = frame.contentWindow.location.href;
                    accessible = true; 
                } catch (e) {
                    // Если там РЕАЛЬНАЯ реклама (другой домен), браузер выдаст ошибку доступа
                    accessible = false; 
                }

                if (frame && frame.offsetHeight > 10 && !accessible) {
                    isAdBlocked = false; 
                    adStatus.innerText = "AD APPROVED ✅";
                    adStatus.style.color = "#00ff00";
                } else {
                    isAdBlocked = true;
                    adStatus.innerText = "ADBLOCK DETECTED!";
                    adStatus.style.color = "#ff4444";
                }
            }, 500);

            const countdown = setInterval(() => {
                timeLeft--;
                adTimerText.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    clearInterval(checkInterval);
                    adOverlay.style.display = 'none';

                    if (isAdBlocked) {
                        alert("No coins! AdGuard DNS detected.");
                        collectBtn.disabled = false;
                    } else {
                        addCoins();
                        setTimeout(() => { collectBtn.disabled = false; }, 3000);
                    }
                    
                    adStatus.innerText = "LOADING REWARD...";
                    adStatus.style.color = "#facc15";
                }
            }, 1000);
        }

        function addCoins() {
            coins += 25;
            balanceDisplay.innerText = coins + " Coins";
            localStorage.setItem('miner_balance', coins);
        }
    </script>
</body>
</html>

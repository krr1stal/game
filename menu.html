<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Miner</title>
    
    <style>
        body { 
            margin: 0; 
            background-color: #1a1613; 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            -webkit-user-select: none;
        }

        .header { padding: 15px 20px; font-weight: bold; color: #facc15; font-size: 18px; text-align: left; }
        
        .balance-container { 
            background: rgba(0, 0, 0, 0.4); margin: 5px 20px; padding: 12px; 
            border-radius: 10px; border: 2px solid #3d2b1f; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .amount { color: #ffffff; font-size: 20px; font-weight: bold; }

        /* ИГРОВАЯ ЗОНА */
        .game-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding-bottom: 190px; /* Увеличили отступ из-за поднятого баннера */
        }
        
        .pickaxe { font-size: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(250,204,21,0.2)); }

        .collect-btn { 
            background: #facc15; color: #1a1613; border: none; padding: 15px 40px; 
            border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; 
            box-shadow: 0 4px 0 #a16207; transition: transform 0.1s;
        }
        .collect-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a16207; }
        .collect-btn:disabled { background: #555; box-shadow: none; color: #888; cursor: not-allowed; }

        /* ПОСТОЯННЫЙ БАННЕР - ПОДНЯТ ЕЩЕ ВЫШЕ */
        .banner-area {
            position: fixed;
            bottom: 110px; /* Подняли со 80px до 110px */
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 90;
        }

        /* НИЖНЕЕ МЕНЮ */
        .nav-bar { 
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: #000; 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            border-top: 1px solid #333; 
            z-index: 100;
        }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; width: 50%; cursor: pointer; }
        .nav-item.active { color: #facc15; }
        .nav-icon { font-size: 24px; margin-bottom: 3px; }

        /* ОКНО REWARDED-РЕКЛАМЫ */
        #ad-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="ad-overlay">
        <div style="font-size: 40px;">💎</div>
        <h2 id="ad-status" style="color: #facc15; margin: 10px 0; font-size: 18px;">VERIFYING...</h2>
        <div style="width: 300px; height: 250px; background: #000; margin: 10px 0; overflow: hidden;">
            <iframe id="ad-frame" data-aa='2436645' src='https://acceptable.a-ads.com/2436645/?size=300x250'
                    style='border:0; padding:0; width:300px; height:250px; display: block;'></iframe>
        </div>
        <p style="font-size: 14px;">Please wait <span id="ad-timer" style="color:#facc15; font-weight:bold;">10</span>s</p>
    </div>

    <div class="header">Crypto Miner</div>

    <div class="balance-container">
        <span style="color: #facc15;">Balance</span>
        <span class="amount" id="balance">0 Coins</span>
    </div>

    <div class="game-area">
        <div class="pickaxe">⛏️</div>
        <button id="collect-btn" class="collect-btn" onclick="showAd()">Collect 25 Coins</button>
    </div>

    <div class="banner-area">
        <iframe data-aa='2436645' src='https://acceptable.a-ads.com/2436645/?size=Adaptive' 
                style='border:0; padding:0; width:100%; height:60px; overflow:hidden; background-color: transparent;'></iframe>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="location.reload()">
            <span class="nav-icon">🏠</span>Home
        </div>
        <div class="nav-item" onclick="alert('Wallet coming soon!')">
            <span class="nav-icon">👛</span>Wallet
        </div>
    </div>

    <script>
        let coins = Number(localStorage.getItem('miner_balance')) || 0;
        let canEarn = false; 

        const balanceDisplay = document.getElementById('balance');
        const adOverlay = document.getElementById('ad-overlay');
        const adTimerText = document.getElementById('ad-timer');
        const collectBtn = document.getElementById('collect-btn');
        const adStatus = document.getElementById('ad-status');

        balanceDisplay.innerText = coins + " Coins";

        async function verifyAdConnection() {
            try {
                const response = await fetch('https://acceptable.a-ads.com/favicon.ico', { 
                    mode: 'no-cors', 
                    cache: 'no-store' 
                });
                return true; 
            } catch (err) {
                return false; 
            }
        }

        async function showAd() {
            collectBtn.disabled = true;
            adOverlay.style.display = 'flex';
            canEarn = false; 
            
            adStatus.innerText = "CHECKING CONNECTION...";
            adStatus.style.color = "#facc15";

            const isConnected = await verifyAdConnection();

            if (isConnected) {
                adStatus.innerText = "AD LOADED ✅";
                adStatus.style.color = "#00ff00";
                canEarn = true; 
            } else {
                adStatus.innerText = "ADBLOCK DETECTED! ❌";
                adStatus.style.color = "#ff4444";
                canEarn = false; 
            }

            let timeLeft = 10;
            adTimerText.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                adTimerText.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    adOverlay.style.display = 'none';

                    if (canEarn) {
                        addCoins();
                    } else {
                        alert("Reward blocked! Disable AdBlock/AdGuard to earn coins.");
                    }
                    
                    setTimeout(() => { collectBtn.disabled = false; }, 2000);
                }
            }, 1000);
        }

        function addCoins() {
            coins += 25;
            balanceDisplay.innerText = coins + " Coins";
            localStorage.setItem('miner_balance', coins);
        }
    </script>
</body>
</html>

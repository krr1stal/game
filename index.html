<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        body { margin: 0; background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #facc15; font-family: sans-serif; }
        .coin { width: 100px; height: 100px; background: radial-gradient(circle, #facc15 0%, #a16207 100%); border-radius: 50%; box-shadow: 0 0 20px #facc1566; animation: spin 3s infinite linear; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: white; }
        @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .progress-container { width: 70%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #facc15; box-shadow: 0 0 15px #facc15; }
    </style>
</head>
<body>
    <div class="coin">₿</div>
    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
    <p id="status" style="margin-top: 20px;">Loading... 0%</p>

    <script>
        let prg = 0;
        const b = document.getElementById('bar');
        const s = document.getElementById('status');
        const i = setInterval(() => {
            prg++;
            b.style.width = prg + "%";
            s.innerText = "Loading... " + prg + "%";
            if (prg >= 100) {
                clearInterval(i);
                window.location.href = "menu.html"; // Переход на файл меню
            }
        }, 50);
    </script>
</body>
</html>

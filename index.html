<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Miner</title>
    <style>
        /* СТИЛИ ЗАГРУЗКИ */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* Поверх всего */
            transition: opacity 0.5s ease;
        }

        .coin {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #facc15 0%, #a16207 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5);
            animation: spin 3s infinite linear;
            margin-bottom: 30px;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .progress-container {
            width: 70%; height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: #facc15;
            box-shadow: 0 0 10px #facc15;
        }

        .loading-text {
            margin-top: 15px;
            color: #facc15;
            font-family: sans-serif;
            font-size: 14px;
        }

        /* СТИЛИ ТВОЕЙ ИГРЫ (Скрыта пока идет загрузка) */
        #game-content {
            display: none; 
            text-align: center;
            padding-top: 50px;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body style="margin:0; background-color: #0d1117;">

    <div id="loading-screen">
        <div class="coin">₿</div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        <div class="loading-text" id="status">Loading Game... 0%</div>
    </div>

    <div id="game-content">
        <h1>CRYPTO MINER</h1>
        <p>Добро пожаловать в игру!</p>
        <button style="padding: 15px 30px; background: #facc15; border: none; border-radius: 10px; font-weight: bold;">
            START MINING
        </button>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loader = document.getElementById('loading-screen');
        const game = document.getElementById('game-content');

        let progress = 0;
        const interval = setInterval(() => {
            progress += 1;
            bar.style.width = progress + "%";
            status.innerText = `Loading Game... ${progress}%`;

            if (progress >= 100) {
                clearInterval(interval);
                
                // Скрываем загрузку и показываем игру
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    game.style.display = 'block';
                }, 500);
            }
        }, 50); // 50мс * 100 шагов = 5000мс (5 секунд)
    </script>
</body>
</html>
